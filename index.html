<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Currency Converter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4F46E5">
</head>
<body>
  <div class="container">
    <h1>💱 World Currency Converter</h1>
    <p class="subtitle">Live rates - Installable PWA</p>

    <div class="converter-box">
      <input type="number" id="amount" placeholder="Enter Amount" value="1" min="0">

      <div class="select-box">
        <div>
          <label>From</label>
          <select id="fromCurrency"></select>
        </div>
        <button id="swapBtn">⇅</button>
        <div>
          <label>To</label>
          <select id="toCurrency"></select>
        </div>
      </div>

      <button id="convertBtn">Convert</button>

      <div class="result-box">
        <h2 id="result">1 USD = 278.50 PKR</h2>
        <p id="rate">Last Updated: Loading...</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
